<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tənzimləmələr | BizPlan.ai</title>
    <!-- Şriftlər və İkonlar -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      :root {
        --text-main: #0f172a;
        --text-muted: #64748b;
        --bg-gradient: linear-gradient(
          135deg,
          #eef2f7 0%,
          #e0eafd 50%,
          #f0fdf4 100%
        );
        --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        --btn-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
        --card-gradient: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.85) 0%,
          rgba(243, 244, 246, 0.7) 100%
        );
        --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
        --error-gradient: linear-gradient(135deg, #ef4444 0%, #f43f5e 100%);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        color: var(--text-main);
        min-height: 100vh;
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: fluidBg 14s ease infinite;
        position: relative;
      }

      @keyframes fluidBg {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      #spiderWebCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* --- LAYOUT STRUCTURE --- */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* --- SIDEBAR --- */
      .sidebar {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid rgba(255, 255, 255, 0.5);
        padding: 35px 24px;
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 30px rgba(0, 0, 0, 0.01);
        z-index: 99;
      }

      .sidebar .logo {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 45px;
        padding-left: 12px;
      }

      .sidebar .logo span {
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        color: var(--text-muted);
        text-decoration: none;
        border-radius: 14px;
        transition: all 0.25s ease;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .nav-link i {
        font-size: 1.1rem;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.6);
        color: #4f46e5;
      }
      .nav-link.active {
        background: var(--btn-gradient);
        color: #ffffff !important;
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2);
      }

      /* --- MAIN CONTENT AREA --- */
      .main-content {
        padding: 40px;
        max-width: 1000px;
        width: 100%;
        opacity: 0;
        transform: scale(0.98) translateY(15px);
        animation: contentEntry 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes contentEntry {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      header {
        margin-bottom: 35px;
      }
      header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      header p {
        color: var(--text-muted);
        font-weight: 500;
      }

      /* --- SETTINGS CARD --- */
      .settings-card {
        background: var(--card-gradient);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 30px 60px rgba(148, 163, 184, 0.15);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .settings-section-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        padding-bottom: 10px;
      }

      .avatar-upload-wrapper {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
      }

      .avatar-preview {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: var(--primary-gradient);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
      }

      .btn-upload-avatar {
        padding: 10px 18px;
        border: 1px solid rgba(79, 70, 229, 0.3);
        border-radius: 10px;
        background: #ffffff;
        color: #4f46e5;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-upload-avatar:hover {
        background: #4f46e5;
        color: #ffffff;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }
      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .form-control {
        width: 100%;
        padding: 13px 16px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        color: var(--text-main);
        outline: none;
        transition: all 0.25s ease;
      }
      .form-control:focus {
        border-color: #4f46e5;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }

      .btn-save-settings {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 14px;
        background: var(--btn-gradient);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
        margin-top: 15px;
      }
      .btn-save-settings:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(79, 70, 229, 0.35);
      }

      /* --- ALERT MODAL OVERLAY --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        padding: 16px;
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .custom-alert-modal {
        background: #ffffff;
        border-radius: 24px;
        padding: 35px;
        width: 100%;
        max-width: 380px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.8);
        transform: scale(0.85);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .modal-overlay.active .custom-alert-modal {
        transform: scale(1);
      }
      .alert-icon {
        width: 56px;
        height: 56px;
        background: #fee2e2;
        color: #ef4444;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        margin: 0 auto 16px auto;
      }
      .alert-icon.success {
        background: #dcfce7;
        color: #10b981;
      }
      .alert-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 8px;
      }
      .alert-desc {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .btn-alert-close {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        background: var(--error-gradient);
        color: white;
      }
      .btn-alert-close.success-btn {
        background: var(--success-gradient);
      }

      /* --- RESPONSIVE HEADER --- */
      .mobile-header {
        display: none;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        padding: 16px 24px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      @media (max-width: 992px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: fixed;
          left: -280px;
          top: 0;
          width: 280px;
          height: 100vh;
          background: rgba(255, 255, 255, 0.98);
          box-shadow: 15px 0 40px rgba(0, 0, 0, 0.05);
        }
        .sidebar.active {
          left: 0;
        }
        .mobile-header {
          display: flex;
        }
        .main-content {
          padding: 30px 16px;
        }
      }

      @media (max-width: 640px) {
        .form-grid {
          grid-template-columns: 1fr;
          gap: 0;
        }
        .settings-card {
          padding: 24px 16px;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body class="dashboard-grid">
    <!-- CANVAS SPIDER WEB ANIMASIYASI 🕸 -->
    <canvas id="spiderWebCanvas"></canvas>

    <!-- MƏRKƏZİ ALERT MODAL -->
    <div class="modal-overlay" id="alertModalOverlay">
      <div class="custom-alert-modal">
        <div class="alert-icon" id="alertIcon">
          <i class="fa-solid fa-circle-exclamation"></i>
        </div>
        <div class="alert-title" id="alertTitle">Xəta!</div>
        <div class="alert-desc" id="alertDesc">Məlumatları doldurun.</div>
        <button type="button" class="btn-alert-close" id="alertCloseBtn">
          Anladım
        </button>
      </div>
    </div>

    <!-- MOBİL NAVBAR -->
    <div class="mobile-header">
      <a
        href="index.html"
        style="
          font-size: 1.3rem;
          font-weight: 800;
          text-decoration: none;
          color: var(--text-main);
        "
        >BizPlan<span>.ai</span></a
      >
      <button
        type="button"
        style="
          font-size: 1.3rem;
          background: none;
          border: none;
          cursor: pointer;
        "
        id="mobileMenuToggle"
      >
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <!-- SIDEBAR PANEL -->
    <aside class="sidebar" id="dashboardSidebar">
      <div class="logo">BizPlan<span>.ai</span></div>
      <nav style="flex: 1">
        <a href="dashboard.html" class="nav-link">📊 Ümumi Baxış</a>
        <a href="new-order.html" class="nav-link">➕ Yeni Sifariş</a>
        <a href="senedlerim.html" class="nav-link">📁 Sənədlərim</a>
        <a href="tenzimlemeler.html" class="nav-link active"
          >⚙️ Tənzimləmələr</a
        >
      </nav>
    </aside>

    <!-- TƏNZİMLƏMƏLƏR BÖLMƏSİ -->
    <main class="main-content">
      <header>
        <h1>Hesab Tənzimləmələri</h1>
        <p>
          Profil məlumatlarınızı redaktə edin və təhlükəsizlik sazlamalarını
          yeniləyin.
        </p>
      </header>

      <form id="settingsForm" class="settings-card" novalidate>
        <!-- Şəkil Yükləmə Sahəsi -->
        <div class="avatar-upload-wrapper">
          <div class="avatar-preview" id="avatarIcon">
            <i class="fa-solid fa-user-tie"></i>
          </div>
          <div>
            <button
              type="button"
              class="btn-upload-avatar"
              onclick="alert('Profil şəkli seçmə simulyasiyası açıldı!')"
            >
              <i class="fa-solid fa-camera"></i> Şəkli dəyiş
            </button>
            <p
              style="
                color: var(--text-muted);
                font-size: 0.8rem;
                margin-top: 6px;
                font-weight: 500;
              "
            >
              PNG, JPG formatları (Maks. 2MB)
            </p>
          </div>
        </div>

        <!-- Bölmə 1: Şəxsi Məlumatlar -->
        <div class="settings-section-title">
          <i class="fa-solid fa-address-card" style="color: #4f46e5"></i> Şəxsi
          Məlumatlar
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Ad və Soyad</label>
            <input
              type="text"
              id="setName"
              class="form-control"
              value="Sahibkar"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email Ünvanı</label>
            <input
              type="email"
              id="setEmail"
              class="form-control"
              value="sahibkar@bizplan.ai"
            />
          </div>
        </div>

        <!-- Bölmə 2: Təhlükəsizlik -->
        <div class="settings-section-title" style="margin-top: 15px">
          <i class="fa-solid fa-shield-halved" style="color: #4f46e5"></i>
          Şifrəni Yenilə
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Cari Şifrə</label>
            <input
              type="password"
              id="currentPass"
              class="form-control"
              placeholder="••••••••"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Yeni Şifrə</label>
            <input
              type="password"
              id="newPass"
              class="form-control"
              placeholder="Minimum 8 simvol"
            />
          </div>
        </div>

        <button type="submit" class="btn-save-settings">
          Dəyişiklikləri Yadda Saxla
        </button>
      </form>
    </main>

    <script>
      // 1. MOBİL MENU TOGGLE
      const menuToggle = document.getElementById("mobileMenuToggle");
      const sidebar = document.getElementById("dashboardSidebar");
      if (menuToggle) {
        menuToggle.addEventListener("click", (e) => {
          e.stopPropagation();
          sidebar.classList.toggle("active");
        });
        document.addEventListener("click", (e) => {
          if (
            !sidebar.contains(e.target) &&
            sidebar.classList.contains("active")
          ) {
            sidebar.classList.remove("active");
          }
        });
      }

      // 2. MODAL VƏ FORM VALİDASİYA IDARƏETMƏSİ
      const form = document.getElementById("settingsForm");
      const setName = document.getElementById("setName");
      const setEmail = document.getElementById("setEmail");
      const currentPass = document.getElementById("currentPass");
      const newPass = document.getElementById("newPass");

      const modalOverlay = document.getElementById("alertModalOverlay");
      const alertIcon = document.getElementById("alertIcon");
      const alertTitle = document.getElementById("alertTitle");
      const alertDesc = document.getElementById("alertDesc");
      const alertCloseBtn = document.getElementById("alertCloseBtn");

      function triggerAlert(type, title, desc) {
        if (type === "success") {
          alertIcon.className = "alert-icon success";
          alertIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
          alertCloseBtn.className = "btn-alert-close success-btn";
          alertCloseBtn.innerText = "Davam et";
        } else {
          alertIcon.className = "alert-icon";
          alertIcon.innerHTML =
            '<i class="fa-solid fa-circle-exclamation"></i>';
          alertCloseBtn.className = "btn-alert-close";
          alertCloseBtn.innerText = "Anladım";
        }
        alertTitle.innerText = title;
        alertDesc.innerText = desc;
        modalOverlay.classList.add("active");
      }

      alertCloseBtn.addEventListener("click", () =>
        modalOverlay.classList.remove("active"),
      );

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        if (!setName.value.trim() || !setEmail.value.trim()) {
          triggerAlert(
            "error",
            "Diqqət!",
            "Ad və Email xanaları boş buraxıla bilməz.",
          );
          return;
        }

        // Əgər şifrə dəyişdirilmək istənirsə
        if (currentPass.value || newPass.value) {
          if (!currentPass.value || !newPass.value) {
            triggerAlert(
              "error",
              "Eksik məlumat!",
              "Şifrəni yeniləmək üçün həm cari, həm də yeni şifrəni daxil etməlisiniz.",
            );
            return;
          }
          if (newPass.value.length < 8) {
            triggerAlert(
              "error",
              "Zəif Şifrə!",
              "Yeni şifrənin uzunluğu minimum 8 simvol olmalıdır.",
            );
            return;
          }
        }

        triggerAlert(
          "success",
          "Uğurlu Əməliyyat!",
          "Hesab tənzimləmələriniz uğurla yadda saxlanıldı.",
        );
      });

      // 3. INTERAKTIV SPIDER WEB ANIMASIYASI 🕸
      const canvas = document.getElementById("spiderWebCanvas");
      const ctx = canvas.getContext("2d");
      let width = (canvas.width = window.innerWidth);
      let height = (canvas.height = window.innerHeight);
      const dots = [];
      const numDots = 55;
      const maxDist = 130;
      const mouse = { x: null, y: null, radius: 160 };

      window.addEventListener("resize", () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });
      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      window.addEventListener("mouseleave", () => {
        mouse.x = null;
        mouse.y = null;
      });

      class Dot {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.7;
          this.vy = (Math.random() - 0.5) * 0.7;
          this.radius = 2.5;
        }
        update() {
          if (mouse.x !== null && mouse.y !== null) {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < mouse.radius) {
              const force = (mouse.radius - dist) / mouse.radius;
              this.x -= (dx / dist) * force * 1.4;
              this.y -= (dy / dist) * force * 1.4;
            }
          }
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(79, 70, 229, 0.2)";
          ctx.fill();
        }
      }

      for (let i = 0; i < numDots; i++) dots.push(new Dot());

      function animateWeb() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < dots.length; i++) {
          dots[i].update();
          dots[i].draw();
          for (let j = i + 1; j < dots.length; j++) {
            const dx = dots[i].x - dots[j].x;
            const dy = dots[i].y - dots[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < maxDist) {
              const alpha = ((maxDist - dist) / maxDist) * 0.14;
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(dots[j].x, dots[j].y);
              ctx.strokeStyle = `rgba(79, 70, 229, ${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
          if (mouse.x !== null && mouse.y !== null) {
            const dx = dots[i].x - mouse.x;
            const dy = dots[i].y - mouse.y;
            const dist = Math.hypot(dx, dy);
            if (dist < mouse.radius) {
              const alpha = ((mouse.radius - dist) / mouse.radius) * 0.18;
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.strokeStyle = `rgba(6, 182, 212, ${alpha})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateWeb);
      }
      animateWeb();
    </script>
  </body>
</html>
