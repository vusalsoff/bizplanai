<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qeydiyyat | BizPlan.ai</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      :root {
        --text-main: #0f172a;
        --text-muted: #64748b;
        --bg-gradient: linear-gradient(
          135deg,
          #eef2f7 0%,
          #e0eafd 50%,
          #f0fdf4 100%
        );
        --card-gradient: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9) 0%,
          rgba(243, 244, 246, 0.8) 100%
        );
        --btn-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
        --alert-btn-gradient: linear-gradient(135deg, #ef4444 0%, #f43f5e 100%);
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      /* Canlı, Hərəkətli və İşıqlı 3D Arxa Fon Animasiyası */
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        overflow-x: hidden;
        position: relative;
        background: var(--bg-gradient);
        background-size: 400% 400%;
        animation: fluidBg 14s ease infinite;
      }

      @keyframes fluidBg {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Spider Web Canvas yerləşməsi */
      #spiderWebCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* Qeydiyyat Kartının 3D və Pop-up Animasiyası */
      .login-container {
        width: 100%;
        max-width: 480px;
        background: var(--card-gradient);
        border-radius: 24px;
        padding: 35px 30px;
        z-index: 2;
        box-shadow:
          0 25px 50px rgba(148, 163, 184, 0.15),
          inset 0 1px 2px rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.6);
        position: relative;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        opacity: 0;
        transform: scale(0.92) translateY(20px);
        animation: cardEntry 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes cardEntry {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 20px;
        transition: all 0.2s ease;
      }

      .back-link:hover {
        color: #4f46e5;
        transform: translateX(-3px);
      }

      .header-area {
        text-align: center;
        margin-bottom: 25px;
      }

      .logo {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -1px;
      }

      .logo span {
        background: var(--btn-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--text-muted);
        margin-top: 4px;
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text-main);
      }

      .input-wrapper {
        position: relative;
      }

      .form-control {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
        color: var(--text-main);
        outline: none;
        transition: all 0.25s ease;
      }

      .form-control:focus {
        border-color: #4f46e5;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }

      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.05rem;
      }

      /* Email və Telefonun Yan-Yana Durması üçün Grid (RWD) */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--btn-gradient);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        margin-top: 8px;
      }

      .btn-submit:hover {
        transform: translateY(-1.5px);
        box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
      }

      .footer-text {
        text-align: center;
        margin-top: 24px;
        font-size: 0.9rem;
      }

      .footer-text a {
        color: #4f46e5;
        text-decoration: none;
        font-weight: 700;
      }

      /* MƏRKƏZİ ALERT MODAL STYLE VƏ ANIMASIYASI */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        padding: 16px;
      }

      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .custom-alert-modal {
        background: #ffffff;
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 360px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.8);
        transform: scale(0.8);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .modal-overlay.active .custom-alert-modal {
        transform: scale(1);
      }

      .alert-icon {
        width: 56px;
        height: 56px;
        background: #fee2e2;
        color: #ef4444;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.6rem;
        margin: 0 auto 16px auto;
      }

      .alert-icon.success {
        background: #dcfce7;
        color: #10b981;
      }

      .alert-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      .alert-desc {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-bottom: 20px;
        line-height: 1.5;
      }

      .btn-alert-close {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--alert-btn-gradient);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn-alert-close.success-btn {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }

      /* Responsive Düzəlişlər (RWD Fix) */
      @media (max-width: 540px) {
        .form-grid {
          grid-template-columns: 1fr;
          gap: 0;
        }
        .login-container {
          padding: 28px 20px;
          border-radius: 20px;
        }
        .logo {
          font-size: 1.9rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="spiderWebCanvas"></canvas>

    <div class="modal-overlay" id="alertModalOverlay">
      <div class="custom-alert-modal">
        <div class="alert-icon" id="alertIcon">
          <i class="fa-solid fa-circle-exclamation"></i>
        </div>
        <div class="alert-title" id="alertTitle">Xəta!</div>
        <div class="alert-desc" id="alertDesc">
          Zəhmət olmasa, xanaları doldurun.
        </div>
        <button type="button" class="btn-alert-close" id="alertCloseBtn">
          Anladım
        </button>
      </div>
    </div>

    <div class="login-container">
      <a href="index.html" class="back-link"
        ><i class="fa-solid fa-arrow-left"></i> Ana səhifə</a
      >

      <div class="header-area">
        <div class="logo">BizPlan<span>.ai</span></div>
        <p class="subtitle">Platformaya qoşulun və ideyanızı reallaşdırın</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label">Ad və Soyad</label>
          <div class="input-wrapper">
            <input
              type="text"
              name="fullName"
              id="regFullName"
              class="form-control"
              placeholder="Məs: Əli Əliyev"
            />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Email adresi</label>
            <div class="input-wrapper">
              <input
                type="email"
                name="email"
                id="regEmail"
                class="form-control"
                placeholder="ad@shirkat.com"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Əlaqə nömrəsi</label>
            <div class="input-wrapper">
              <input
                type="tel"
                name="phone"
                id="regPhone"
                class="form-control"
                placeholder="+994 (00) 000-00-00"
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Şifrə</label>
          <div class="input-wrapper">
            <input
              type="password"
              name="password"
              id="regPassword"
              class="form-control"
              placeholder="Minimum 8 simvol"
            />
            <button
              type="button"
              class="toggle-password"
              id="passwordToggleBtn"
            >
              <i class="fa-regular fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Şifrənin təkrarı</label>
          <div class="input-wrapper">
            <input
              type="password"
              name="confirmPassword"
              id="regConfirmPassword"
              class="form-control"
              placeholder="Şifrəni yenidən daxil edin"
            />
            <button
              type="button"
              class="toggle-password"
              id="confirmPasswordToggleBtn"
            >
              <i class="fa-regular fa-eye" id="confirmToggleIcon"></i>
            </button>
          </div>
          <small id="passwordMatchError" style="display: none"></small>
        </div>

        <button type="submit" id="regSubmitBtn" class="btn-submit">
          Hesab Yarat
        </button>
      </form>

      <div class="footer-text">
        <span class="text-muted">Artıq hesabınız var?</span>
        <a href="login.html">Daxil olun</a>
      </div>
    </div>

    <script>
      // Şifrəni Göstər / Gizlə (Əsas Şifrə)
      const passwordInput = document.getElementById("regPassword");
      const toggleBtn = document.getElementById("passwordToggleBtn");
      const toggleIcon = document.getElementById("toggleIcon");

      toggleBtn.addEventListener("click", function () {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.className = "fa-regular fa-eye-slash";
        } else {
          passwordInput.type = "password";
          toggleIcon.className = "fa-regular fa-eye";
        }
      });

      // Şifrəni Göstər / Gizlə (Şifrənin təkrarı)
      const confirmPasswordInput =
        document.getElementById("regConfirmPassword");
      const confirmToggleBtn = document.getElementById(
        "confirmPasswordToggleBtn",
      );
      const confirmToggleIcon = document.getElementById("confirmToggleIcon");

      confirmToggleBtn.addEventListener("click", function () {
        if (confirmPasswordInput.type === "password") {
          confirmPasswordInput.type = "text";
          confirmToggleIcon.className = "fa-regular fa-eye-slash";
        } else {
          confirmPasswordInput.type = "password";
          confirmToggleIcon.className = "fa-regular fa-eye";
        }
      });

      // Modal bağlama və dashboard-a yönləndirmə
      const modalOverlay = document.getElementById("alertModalOverlay");
      const alertCloseBtn = document.getElementById("alertCloseBtn");

      alertCloseBtn.addEventListener("click", () => {
        modalOverlay.classList.remove("active");
        if (window.isRegisterSuccess) {
          window.location.replace("dashboard.html");
        }
      });

      // --- INTERAKTIV SPIDER WEB ANIMASIYASI 🕸️ ---
      const canvas = document.getElementById("spiderWebCanvas");
      const ctx = canvas.getContext("2d");
      let width = (canvas.width = window.innerWidth);
      let height = (canvas.height = window.innerHeight);
      const dots = [];
      const numDots = 55; // Səhifə üçün ideal sıxlıq
      const maxDist = 125;
      const mouse = { x: null, y: null, radius: 150 };

      window.addEventListener("resize", () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener("mouseleave", () => {
        mouse.x = null;
        mouse.y = null;
      });

      class Dot {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.7;
          this.vy = (Math.random() - 0.5) * 0.7;
          this.radius = 2.5;
        }
        update() {
          if (mouse.x !== null && mouse.y !== null) {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < mouse.radius) {
              const force = (mouse.radius - dist) / mouse.radius;
              this.x -= (dx / dist) * force * 1.3;
              this.y -= (dy / dist) * force * 1.3;
            }
          }
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(79, 70, 229, 0.22)";
          ctx.fill();
        }
      }

      for (let i = 0; i < numDots; i++) dots.push(new Dot());

      function animateWeb() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < dots.length; i++) {
          dots[i].update();
          dots[i].draw();
          for (let j = i + 1; j < dots.length; j++) {
            const dx = dots[i].x - dots[j].x;
            const dy = dots[i].y - dots[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < maxDist) {
              const alpha = ((maxDist - dist) / maxDist) * 0.14;
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(dots[j].x, dots[j].y);
              ctx.strokeStyle = `rgba(79, 70, 229, ${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
          if (mouse.x !== null && mouse.y !== null) {
            const dx = dots[i].x - mouse.x;
            const dy = dots[i].y - mouse.y;
            const dist = Math.hypot(dx, dy);
            if (dist < mouse.radius) {
              const alpha = ((mouse.radius - dist) / mouse.radius) * 0.18;
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.strokeStyle = `rgba(6, 182, 212, ${alpha})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateWeb);
      }
      animateWeb();
    </script>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
